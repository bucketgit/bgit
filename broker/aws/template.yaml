                return response(200, {pr});
              }
              if (path === "/prs/close" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = requireOperation(event, entry, "write");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                pr.status = "closed";
                pr.closed_by = key.user;
                pr.closed_at = new Date().toISOString();
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_close", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/reopen" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = requireOperation(event, entry, "write");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                pr.status = "open";
                delete pr.closed_by;
                delete pr.closed_at;
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_reopen", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/comment" && method === "POST") {
                const entry = await loadRepo(body.repo);
                if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
                const key = requireOperation(event, entry, "read");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                const comment = String(body.comment || "").trim();
                if (!comment) throw Object.assign(new Error("comment is required"), {statusCode: 400});
                pr.comments = pr.comments || [];
                pr.comments.push({id: nextPRNoteID(pr), user: key.user, body: comment, at: new Date().toISOString()});
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_comment", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/reply" && method === "POST") {
                const entry = await loadRepo(body.repo);
                if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
                const key = requireOperation(event, entry, "read");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                const comment = String(body.comment || "").trim();
                if (!comment) throw Object.assign(new Error("comment is required"), {statusCode: 400});
                const target = findPRReplyTarget(pr, Number(body.target_note_id || 0), Number(body.target_comment_id || 0));
                if (!target) throw Object.assign(new Error("reply target not found"), {statusCode: 404});
                target.replies = target.replies || [];
                target.replies.push({id: nextPRCommentID(pr), user: key.user, body: comment, kind: "reply", at: new Date().toISOString()});
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_reply", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/review" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = requireOperation(event, entry, "write");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                const state = String(body.review || "").trim();
                if (!["commented", "approved", "changes_requested"].includes(state)) throw Object.assign(new Error("unsupported review state"), {statusCode: 400});
                pr.reviews = pr.reviews || [];
                const comments = normalizeReviewComments(pr, body.comments, key, pr.head);
                pr.reviews.push({id: nextPRNoteID(pr), user: key.user, body: String(body.comment || "").trim(), state, comments, head: String(pr.head || ""), at: new Date().toISOString()});
                pr.approvals = countApprovals(pr);
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_review", id: pr.id, user: key.user, state});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/merge" && method === "POST") {
                const entry = await loadRepo(body.repo);
                if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
                const key = requireOperation(event, entry, "merge");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                if (pr.status !== "open") throw new Error("pull request is not open");
                const newHash = (entry.data.refs || {})[pr.source] || pr.head;
                if (!newHash) throw new Error("pull request source ref has no head");
                const oldHash = (entry.data.refs || {})[pr.target] || zero;
                await updateRefCAS(body.repo, pr.target, oldHash, newHash, key, {fromPR: true});
                const repo = await ensurePhysicalRepo(entry);
                await writeTextObject(repo, pr.target, newHash + "\n");
                entry.data.refs = entry.data.refs || {};
                entry.data.refs[pr.target] = newHash;
                pr.status = "merged";
                pr.merged_by = key.user;
                pr.merged_at = new Date().toISOString();
                bumpPRVersion(entry.data, pr);
                if (body.delete_branch && pr.source && pr.source !== pr.target) {
                  delete entry.data.refs[pr.source];
                  await deleteObject(repo, pr.source);
                  audit(entry, {type: "branch_delete", ref: pr.source, from_pr: pr.id, user: key.user});
                }
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/auth/check" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = signedKey(event, entry);
                const operation = body.operation || "";
                const allowed = (operation === "read" && repoIsPublic(entry)) || (!!key && roleAllows(key.role, operation));
                return response(200, {allowed, user: key && key.user || (allowed ? "anonymous" : ""), role: key && key.role || (allowed ? "read" : "")});
              }
              if (path === "/auth/status" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = signedKey(event, entry) || (repoIsPublic(entry) ? anonymousKey() : null);
                if (!key) throw Object.assign(new Error("SSH signature required"), {statusCode: 403});
                return response(200, {
                  broker_version: brokerVersion,
                  repo: entry.data.repo || body.repo,
                  identity: {user: key.user || "", source: key.source || "", key_fingerprint: key.public_key ? keyFingerprint(key.public_key) : "", public_key: key.public_key || ""},
                  user: key.user || "",
                  role: key.role || "",
                  capabilities: roleCapabilities(key.role || ""),
                  resolved_at: new Date().toISOString(),
                });
              }
              if (path === "/repos/mine" && method === "POST") {
                const fingerprint = header(event, "x-bgit-key-fingerprint") || "";
                if (!fingerprint) throw Object.assign(new Error("SSH signature required"), {statusCode: 403});
                const out = await db.send(new QueryCommand({
                  TableName: memberTable,
                  KeyConditionExpression: "fingerprint = :fingerprint",
                  ExpressionAttributeValues: {":fingerprint": {S: fingerprint}}
                }));
                const repos = [];
                for (const item of out.Items || []) {
                  const data = JSON.parse(item.data.S || "{}");
                  if (!data.suspended && data.repo && (data.repo.logical || (data.repo.bucket && data.repo.prefix))) repos.push({...data, key_fingerprint: fingerprint});
                }
                repos.sort((a, b) => String(a.logical || a.repo_id || "").localeCompare(String(b.logical || b.repo_id || "")));
                return response(200, {repos});
              }
              if (path === "/members/reindex" && method === "POST") {
                if (body.repo && (body.repo.logical || body.repo.bucket || body.repo.prefix)) {
                  const entry = await loadRepo(body.repo);
                  requireAdmin(event, entry);
                  await syncMembershipIndex(entry);
                  return response(200, {ok: true, repositories: 1});
                }
                const owners = await loadOwners();
                if (!verifySignature(event, owners)) throw Object.assign(new Error("owner SSH signature required"), {statusCode: 403});
                const count = await syncAllMembershipIndexes();
                return response(200, {ok: true, repositories: count});
              }
              if (path === "/objects/capability" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const operation = body.operation || "read";
                const key = requireOperation(event, entry, operation === "read" ? "read" : "write");
                const repo = await ensurePhysicalRepo(entry);
                const capability = await objectCapability(repo, body.path, operation, key);
                audit(entry, {type: "capability_issued", operation, path: body.path, user: key.user, role: key.role});
                await saveRepo(entry);
                return response(200, capability);
              }
              if (path === "/objects/read" && method === "POST") {
                const entry = await loadRepo(body.repo);
                requireOperation(event, entry, "read");
                const repo = await ensurePhysicalRepo(entry);
                return response(200, {data: await readObject(repo, body.path)});
              }
              if (path === "/objects/list" && method === "POST") {
                const entry = await loadRepo(body.repo);
                requireOperation(event, entry, "read");
                const repo = await ensurePhysicalRepo(entry);
                return response(200, {paths: await listObjects(repo, body.prefix)});
              }
              if (path === "/refs/update" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = requireOperation(event, entry, "write");
                await updateRefCAS(body.repo, body.ref, body.old, body.new, key, {override: !!body.override});
                return response(200, {ok: true});
              }
              return response(404, {error: "unknown broker endpoint"});
            } catch (err) {
              return response(err.statusCode || 500, {error: err.message || String(err)});
            }
          };
  BrokerFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref BrokerFunction
      AuthType: NONE
  BrokerFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BrokerFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE
  BrokerFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BrokerFunction
      Action: lambda:InvokeFunction
      Principal: '*'
      InvokedViaFunctionUrl: true
Outputs:
  BrokerUrl:
    Value: !GetAtt BrokerFunctionUrl.FunctionUrl
