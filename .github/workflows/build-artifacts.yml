name: Build Artifacts

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            artifact_name: bgit-mac-arm64
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            artifact_name: bgit-mac-amd64
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            artifact_name: bgit-linux-amd64
          - os: ubuntu-24.04
            goos: linux
            goarch: arm64
            artifact_name: bgit-linux-arm64
          - os: windows-2022
            goos: windows
            goarch: amd64
            artifact_name: bgit-windows-amd64.exe
          - os: windows-2022
            goos: windows
            goarch: arm64
            artifact_name: bgit-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve Version From Changelog
        shell: pwsh
        run: |
          if (!(Test-Path "CHANGELOG.md")) {
            throw "Missing CHANGELOG.md"
          }

          $lines = Get-Content "CHANGELOG.md"
          $line = $lines | Where-Object { $_ -match '^\s*##\s+v?(\d+\.\d+\.\d+)(?:\s|$)' } | Select-Object -First 1
          if (-not $line) {
            throw "Could not find semantic version heading in CHANGELOG.md"
          }
          if ($line -notmatch '^\s*##\s+v?(\d+\.\d+\.\d+)(?:\s|$)') {
            throw "Invalid semantic version heading in CHANGELOG.md"
          }

          $version = $Matches[1]
          $releaseTag = $version
          $start = [Array]::IndexOf($lines, $line)
          $notes = New-Object System.Collections.Generic.List[string]

          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\s*##\s+v?\d+\.\d+\.\d+(?:\s|$)') {
              break
            }
            $notes.Add($lines[$i])
          }

          $releaseNotes = ($notes -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
            throw "CHANGELOG.md section for $version has no release notes"
          }

          $releaseNotes | Out-File -FilePath "release-notes.md" -Encoding utf8

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NAME=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ARTIFACT_FILE=${{ matrix.artifact_name }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Test
        run: go test ./...

      - name: Build
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          go build -trimpath -ldflags="-s -w -X main.version=${{ env.APP_VERSION }}" -o "dist/${{ env.ARTIFACT_FILE }}" .

          if (!(Test-Path "dist/${{ env.ARTIFACT_FILE }}")) {
            throw "Missing expected artifact: dist/${{ env.ARTIFACT_FILE }}"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_FILE }}
          path: dist/${{ env.ARTIFACT_FILE }}
          if-no-files-found: error

      - name: Publish To Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          $name = $env:RELEASE_NAME
          $asset = "dist/${{ env.ARTIFACT_FILE }}"
          $repo = "${{ github.repository }}"

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --target main --title $name --notes-file release-notes.md
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag --repo $repo *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "Could not create or access release $tag"
              }
            }
          }

          gh release edit $tag --repo $repo --title $name --notes-file release-notes.md
          gh release upload $tag $asset --repo $repo --clobber
