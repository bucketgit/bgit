AWSTemplateFormatVersion: '2010-09-09'
Description: Minimal bgit SSH broker control-plane endpoint.
Resources:
  BrokerTransferRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub bgit-broker-transfer-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub arn:aws:iam::${AWS::AccountId}:role/bgit-broker-${AWS::Region}
      Policies:
        - PolicyName: bgit-transfer-session-boundary
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:AbortMultipartUpload
                Resource: arn:aws:s3:::*/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:HeadBucket
                  - s3:DeleteBucket
                Resource: arn:aws:s3:::*
  BrokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub bgit-broker-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: bgit-broker-table
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BrokerTable.Arn
                  - !GetAtt BrokerPullRequestTable.Arn
                  - !GetAtt BrokerMemberTable.Arn
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                  - sts:TagSession
                Resource: !GetAtt BrokerTransferRole.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:HeadBucket
                  - s3:DeleteBucket
                Resource:
                  - arn:aws:s3:::*
                  - arn:aws:s3:::*/*
  BrokerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bgit-broker-repos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
  BrokerPullRequestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bgit-broker-prs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: repo_id
          AttributeType: S
        - AttributeName: pr_id
          AttributeType: N
      KeySchema:
        - AttributeName: repo_id
          KeyType: HASH
        - AttributeName: pr_id
          KeyType: RANGE
  BrokerMemberTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bgit-broker-members
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fingerprint
          AttributeType: S
        - AttributeName: repo_id
          AttributeType: S
      KeySchema:
        - AttributeName: fingerprint
          KeyType: HASH
        - AttributeName: repo_id
          KeyType: RANGE
  BrokerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bgit-broker
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt BrokerRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref BrokerTable
          PR_TABLE_NAME: !Ref BrokerPullRequestTable
          MEMBER_TABLE_NAME: !Ref BrokerMemberTable
          TRANSFER_ROLE_ARN: !GetAtt BrokerTransferRole.Arn
          BROKER_VERSION: {{BROKER_VERSION}}
      Code:
        ZipFile: |
          const crypto = require("crypto");
          const {DynamoDBClient, GetItemCommand, PutItemCommand, QueryCommand, ScanCommand, DeleteItemCommand} = require("@aws-sdk/client-dynamodb");
          const {S3Client, GetObjectCommand, PutObjectCommand, DeleteObjectCommand, ListObjectsV2Command, HeadBucketCommand, CreateBucketCommand, DeleteBucketCommand} = require("@aws-sdk/client-s3");
          const {STSClient, AssumeRoleCommand} = require("@aws-sdk/client-sts");
          const db = new DynamoDBClient({});
          const s3 = new S3Client({});
          const sts = new STSClient({});
          const table = process.env.TABLE_NAME;
          const prTable = process.env.PR_TABLE_NAME;
          const memberTable = process.env.MEMBER_TABLE_NAME;
          const transferRoleArn = process.env.TRANSFER_ROLE_ARN;
          const brokerVersion = process.env.BROKER_VERSION || "{{BROKER_VERSION}}";
          const zero = "0000000000000000000000000000000000000000";
          function response(statusCode, body) {
            return {statusCode, headers: {"content-type": "application/json"}, body: JSON.stringify(body)};
          }
          function repoID(repo) {
            if (repo && repo.logical) return ["logical", repo.logical].join(":");
            return [repo.provider || "s3", repo.bucket, repo.prefix].join(":");
          }
          function docID(repo) {
            return Buffer.from(repoID(repo)).toString("base64url");
          }
          function cleanName(value) {
            return String(value || "repo").toLowerCase().replace(/[^a-z0-9.-]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "repo";
          }
          function randomSuffix() {
            return crypto.randomBytes(5).toString("hex");
          }
          async function loadRepo(repo) {
            if (!repo || (!repo.logical && (!repo.bucket || !repo.prefix))) throw new Error("repo is required");
            const id = docID(repo);
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            let data = {repo, keys: [], audit: []};
            if (out.Item) data = JSON.parse(out.Item.data.S || "{}");
            data.repo = data.repo || repo;
            data.keys = data.keys || [];
            data.audit = data.audit || [];
            const owners = await loadOwners();
            for (const owner of owners.data.keys || []) {
              if (owner.role === "owner" && !data.keys.find((k) => normalizeKey(k.public_key) === normalizeKey(owner.public_key))) data.keys.push(owner);
            }
            return {id, data};
          }
          async function saveRepo(entry) {
            await db.send(new PutItemCommand({TableName: table, Item: {id: {S: entry.id}, data: {S: JSON.stringify(entry.data)}}}));
            await syncMembershipIndex(entry);
          }
          async function syncMembershipIndex(entry) {
            const repo = entry.data.repo || {};
            if (!repo.logical && (!repo.bucket || !repo.prefix)) return;
            const repoIDValue = repoID(repo);
            const logical = repo.logical || repo.prefix || repoIDValue;
            for (const key of entry.data.keys || []) {
              if (!key.public_key) continue;
              const fingerprint = keyFingerprint(key.public_key);
              await db.send(new PutItemCommand({TableName: memberTable, Item: {
                fingerprint: {S: fingerprint},
                repo_id: {S: repoIDValue},
                data: {S: JSON.stringify({repo_id: repoIDValue, logical, repo, user: key.user || "", role: key.role || "", source: key.source || "", suspended: !!key.suspended, updated_at: new Date().toISOString()})}
              }}));
            }
          }
          async function syncAllMembershipIndexes() {
            let count = 0;
            let ExclusiveStartKey;
            do {
              const out = await db.send(new ScanCommand({TableName: table, ExclusiveStartKey}));
              for (const item of out.Items || []) {
                const id = item.id && item.id.S || "";
                if (id === "_owners") continue;
                const data = JSON.parse(item.data && item.data.S || "{}");
                const repo = data.repo || {};
                if (!repo.logical && (!repo.bucket || !repo.prefix)) continue;
                count++;
                await syncMembershipIndex({id, data});
              }
              ExclusiveStartKey = out.LastEvaluatedKey;
            } while (ExclusiveStartKey);
            return count;
          }
          function prKey(repoID, id) {
            return {repo_id: {S: repoID}, pr_id: {N: String(Number(id))}};
          }
          async function savePR(entry, pr) {
            await db.send(new PutItemCommand({TableName: prTable, Item: {...prKey(entry.id, pr.id), data: {S: JSON.stringify(pr)}}}));
          }
          async function loadPR(entry, id) {
            const out = await db.send(new GetItemCommand({TableName: prTable, Key: prKey(entry.id, id)}));
            if (!out.Item) return null;
            return JSON.parse(out.Item.data.S || "{}");
          }
          async function listPRs(entry) {
            const prs = [];
            let startKey = undefined;
            do {
              const out = await db.send(new QueryCommand({
                TableName: prTable,
                KeyConditionExpression: "repo_id = :repo",
                ExpressionAttributeValues: {":repo": {S: entry.id}},
                ScanIndexForward: false,
                ExclusiveStartKey: startKey
              }));
              for (const item of out.Items || []) {
                const pr = JSON.parse(item.data.S || "{}");
                if (Number(pr.id || 0) > 0 && pr.kind !== "issue") prs.push(pr);
              }
              startKey = out.LastEvaluatedKey;
            } while (startKey);
            return prs;
          }
          async function syncPRRecords(entry, known) {
            const knownMap = known && typeof known === "object" ? known : {};
            const prs = await listPRs(entry);
            const present = new Set(prs.map((pr) => String(pr.id)));
            const deleted = Object.keys(knownMap).filter((id) => !present.has(String(id))).map((id) => Number(id)).filter((id) => Number.isFinite(id));
            return {
              prs: prs.filter((pr) => String(pr.version || "") !== String(knownMap[String(pr.id)] || "")),
              deleted,
            };
          }
          async function loadOwners() {
            const id = "_owners";
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            if (!out.Item) return {id, data: {keys: [], audit: []}};
            const data = JSON.parse(out.Item.data.S || "{}");
            data.keys = data.keys || [];
            data.audit = data.audit || [];
            return {id, data};
          }
          function audit(entry, event) {
            entry.data.audit = (entry.data.audit || []).concat([{...event, at: new Date().toISOString()}]).slice(-500);
          }
          function readSSHString(buf, offset) {
            const len = buf.readUInt32BE(offset);
            const start = offset + 4;
            return {value: buf.subarray(start, start + len), offset: start + len};
          }
          function header(event, name) {
            const headers = event.headers || {};
            return headers[name] || headers[name.toLowerCase()] || "";
          }
          function expectedMessage(rawBody) {
            const digest = crypto.createHash("sha256").update(Buffer.from(rawBody || "{}")).digest("base64");
            return Buffer.from("bgit-broker-v1\n" + digest).toString("base64");
          }
          function normalizeKey(key) {
            return String(key || "").trim().split(/\s+/).slice(0, 2).join(" ");
          }
          function publicKeyObject(publicKey) {
            const parts = normalizeKey(publicKey).split(/\s+/);
            if (parts[0] !== "ssh-ed25519") return crypto.createPublicKey(publicKey);
            const blob = Buffer.from(parts[1], "base64");
            let parsed = readSSHString(blob, 0);
            if (parsed.value.toString() !== "ssh-ed25519") throw new Error("unsupported SSH key algorithm");
            parsed = readSSHString(blob, parsed.offset);
            const derPrefix = Buffer.from("302a300506032b6570032100", "hex");
            return crypto.createPublicKey({key: Buffer.concat([derPrefix, parsed.value]), format: "der", type: "spki"});
          }
          function signedKey(event, entry) {
            const keys = (entry.data.keys || []).filter((k) => !k.suspended);
            const publicKey = normalizeKey(header(event, "x-bgit-key"));
            const message = String(header(event, "x-bgit-signature-message"));
            const signature = String(header(event, "x-bgit-signature"));
            if (!publicKey || !message || !signature || message !== expectedMessage(event.body)) return null;
            const key = keys.find((k) => normalizeKey(k.public_key) === publicKey);
            if (!key) return null;
            const parsed = readSSHString(Buffer.from(signature, "base64"), 0);
            const alg = parsed.value.toString();
            const sig = readSSHString(Buffer.from(signature, "base64"), parsed.offset).value;
            const verifyAlg = alg === "ssh-ed25519" ? null : "sha256";
            if (!crypto.verify(verifyAlg, Buffer.from(message, "base64"), publicKeyObject(publicKey), sig)) return null;
            return key;
          }
          function submittedSignedKey(event) {
            const publicKey = normalizeKey(header(event, "x-bgit-key"));
            const message = String(header(event, "x-bgit-signature-message"));
            const signature = String(header(event, "x-bgit-signature"));
            if (!publicKey || !message || !signature || message !== expectedMessage(event.body)) return null;
            const parsed = readSSHString(Buffer.from(signature, "base64"), 0);
            const alg = parsed.value.toString();
            const sig = readSSHString(Buffer.from(signature, "base64"), parsed.offset).value;
            const verifyAlg = alg === "ssh-ed25519" ? null : "sha256";
            if (!crypto.verify(verifyAlg, Buffer.from(message, "base64"), publicKeyObject(publicKey), sig)) return null;
            return {public_key: publicKey, fingerprint: keyFingerprint(publicKey)};
          }
          function ownershipTransferCode(brokerURL, repo, token) {
            const payload = Buffer.from(JSON.stringify({broker_url: brokerURL, repo, token})).toString("base64url");
            return "bgitot_" + payload;
          }
          function ownershipTransferTokenHash(token) {
            return crypto.createHash("sha256").update(String(token || "")).digest("hex");
          }
          function ownershipTransferExpired(transfer) {
            return !transfer || !transfer.expires_at || Date.parse(transfer.expires_at) <= Date.now();
          }
          function memberInviteCode(brokerURL, repo, token) {
            const payload = Buffer.from(JSON.stringify({broker_url: brokerURL, repo, token})).toString("base64url");
            return "bgitinv_" + payload;
          }
          function verifySignature(event, entry) {
            const adminKeys = (entry.data.keys || []).filter((k) => (k.role === "admin" || k.role === "owner") && !k.suspended);
            if (adminKeys.length === 0) return true;
            const key = signedKey(event, entry);
            return !!key && (key.role === "admin" || key.role === "owner");
          }
          function roleAllows(role, operation) {
            if (role === "owner" || role === "admin") return true;
            if (operation === "read") return ["read", "triage", "developer", "maintainer"].includes(role);
            if (operation === "write") return ["developer", "maintainer"].includes(role);
            if (operation === "merge") return ["maintainer"].includes(role);
            return false;
          }
          function keyFingerprint(publicKey) {
            const parts = String(publicKey || "").trim().split(/\s+/);
            const data = parts.length >= 2 ? Buffer.from(parts[1], "base64") : Buffer.from(normalizeKey(publicKey));
            return "SHA256:" + crypto.createHash("sha256").update(data).digest("base64").replace(/=+$/g, "");
          }
          function keyMatches(item, key) {
            const value = String(key || "").trim();
            if (!value) return false;
            const normalized = normalizeKey(value);
            return normalizeKey(item.public_key) === normalized ||
              item.public_key === value ||
              item.public_key.includes(value) ||
              keyFingerprint(item.public_key) === value;
          }
          function roleCapabilities(role) {
            return {
              read: roleAllows(role, "read"),
              push: roleAllows(role, "write"),
              comment: ["owner", "admin", "maintainer", "developer", "triage"].includes(role),
              review: ["owner", "admin", "maintainer", "developer", "triage"].includes(role),
              approve: ["owner", "admin", "maintainer", "triage"].includes(role),
              merge: roleAllows(role, "merge"),
              admin_keys: role === "owner" || role === "admin",
              manage_protection: role === "owner" || role === "admin",
              reopen_pr: ["owner", "admin", "maintainer"].includes(role),
              owner_transfer: role === "owner",
              broker_upgrade: role === "owner" || role === "admin",
            };
          }
          function anonymousKey() {
            return {user: "anonymous", role: "read", public_key: "", source: "public", anonymous: true};
          }
          function repoIsPublic(entry) {
            return (entry.data.visibility || "private") === "public";
          }
          function repoIsReadOnly(entry) {
            return !!entry.data.read_only;
          }
          function validRole(role) {
            return ["owner", "admin", "maintainer", "developer", "triage", "read"].includes(role);
          }
          function normalizeRole(role) {
            return role === "write" ? "developer" : role;
          }
          function requireAdmin(event, entry) {
            if (!verifySignature(event, entry)) throw Object.assign(new Error("admin SSH signature required"), {statusCode: 403});
          }
          function requireOperation(event, entry, operation) {
            if (operation !== "read" && repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
            const key = signedKey(event, entry);
            if (!key && operation === "read" && repoIsPublic(entry)) return anonymousKey();
            if (!key || !roleAllows(key.role, operation)) throw Object.assign(new Error(operation + " SSH signature required"), {statusCode: 403});
            return key;
          }
          function requireIssueCreate(event, entry) {
            if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
            if (repoIsPublic(entry)) return signedKey(event, entry) || anonymousKey();
            return requireOperation(event, entry, "read");
          }
          function cleanObjectPath(value) {
            const path = String(value || "").replace(/^\/+/, "");
            if (path.includes("\0") || path.includes("..")) throw new Error("invalid object path");
            return path;
          }
          function objectName(repo, objectPath) {
            const prefix = String(repo.prefix || "").replace(/^\/+|\/+$/g, "");
            const path = cleanObjectPath(objectPath);
            return prefix ? prefix + "/" + path : path;
          }
          async function ensurePhysicalRepo(entry) {
            const repo = entry.data.repo || {};
            if (repo.bucket && repo.prefix) return repo;
            const logical = cleanName(repo.logical || repo.prefix || "repo.git");
            const suffix = entry.data.bucket_suffix || randomSuffix();
            const bucket = `bgit-${logical.replace(/\.git$/, "")}-${suffix}`.slice(0, 63).replace(/\.+$/g, "");
            try {
              await s3.send(new HeadBucketCommand({Bucket: bucket}));
            } catch (err) {
              await s3.send(new CreateBucketCommand({Bucket: bucket}));
            }
            entry.data.bucket_suffix = suffix;
            entry.data.repo = {...repo, provider: "s3", bucket, prefix: "repo.git"};
            await saveRepo(entry);
            return entry.data.repo;
          }
          async function streamToBuffer(stream) {
            const chunks = [];
            for await (const chunk of stream) chunks.push(Buffer.from(chunk));
            return Buffer.concat(chunks);
          }
          async function readObject(repo, objectPath) {
            const out = await s3.send(new GetObjectCommand({Bucket: repo.bucket, Key: objectName(repo, objectPath)}));
            const data = await streamToBuffer(out.Body);
            return data.toString("base64");
          }
          async function writeTextObject(repo, objectPath, value) {
            await s3.send(new PutObjectCommand({Bucket: repo.bucket, Key: objectName(repo, objectPath), Body: value}));
          }
          async function deleteObject(repo, objectPath) {
            await s3.send(new DeleteObjectCommand({Bucket: repo.bucket, Key: objectName(repo, objectPath)}));
          }
          async function deletePhysicalRepo(repo) {
            if (!repo.bucket) return;
            let token = undefined;
            do {
              const out = await s3.send(new ListObjectsV2Command({Bucket: repo.bucket, ContinuationToken: token}));
              for (const item of out.Contents || []) {
                await s3.send(new DeleteObjectCommand({Bucket: repo.bucket, Key: item.Key}));
              }
              token = out.NextContinuationToken;
            } while (token);
            await s3.send(new DeleteBucketCommand({Bucket: repo.bucket}));
          }
          async function listObjects(repo, prefix) {
            const repoPrefix = String(repo.prefix || "").replace(/^\/+|\/+$/g, "");
            const queryPrefix = objectName(repo, prefix);
            const paths = [];
            let token = undefined;
            do {
              const out = await s3.send(new ListObjectsV2Command({Bucket: repo.bucket, Prefix: queryPrefix, ContinuationToken: token}));
              for (const item of out.Contents || []) {
                const strip = repoPrefix ? repoPrefix + "/" : "";
                paths.push(item.Key.startsWith(strip) ? item.Key.slice(strip.length) : item.Key);
              }
              token = out.NextContinuationToken;
            } while (token);
            return paths;
          }
          function policyFor(repo, objectPath, operation) {
            const key = objectName(repo, objectPath);
            const actions = operation === "read" ? ["s3:GetObject"] : operation === "delete" ? ["s3:DeleteObject"] : ["s3:PutObject", "s3:AbortMultipartUpload"];
            return JSON.stringify({Version: "2012-10-17", Statement: [
              {Effect: "Allow", Action: actions, Resource: `arn:aws:s3:::${repo.bucket}/${key}`},
              {Effect: "Allow", Action: ["s3:ListBucket"], Resource: `arn:aws:s3:::${repo.bucket}`, Condition: {StringLike: {"s3:prefix": [`${repo.prefix}/*`]}}}
            ]});
          }
          async function objectCapability(repo, objectPath, operation, key) {
            const out = await sts.send(new AssumeRoleCommand({
              RoleArn: transferRoleArn,
              RoleSessionName: `bgit-${operation}-${Date.now()}`,
              DurationSeconds: 900,
              Policy: policyFor(repo, objectPath, operation),
              Tags: [
                {Key: "bgit-operation", Value: operation},
                {Key: "bgit-user", Value: String(key.user || "unknown").slice(0, 128)},
                {Key: "bgit-repo", Value: String(repo.prefix || "repo").slice(0, 128)}
              ]
            }));
            return {
              provider: "s3", mode: "sts", bucket: repo.bucket, prefix: repo.prefix,
              object: objectName(repo, objectPath), region: process.env.AWS_REGION,
              expires_in: 900,
              credentials: {
                access_key_id: out.Credentials.AccessKeyId,
                secret_access_key: out.Credentials.SecretAccessKey,
                session_token: out.Credentials.SessionToken
              }
            };
          }
          function protectionFor(data, ref) {
            return (data.protections || []).find((p) => p.ref === ref);
          }
          function assertRefAllowed(data, ref, key, opts) {
            const protection = protectionFor(data, ref);
            if (!protection || !protection.require_pr) return;
            if (opts && opts.fromPR) return;
            if (protection.allow_overrides && key && (key.role === "owner" || key.role === "admin")) return;
            throw Object.assign(new Error(`protected branch ${ref} requires a pull request`), {statusCode: 403});
          }
          function nextPRID(data) {
            data.next_pr_id = Number(data.next_pr_id || 1);
            return data.next_pr_id++;
          }
          function findPR(data, id) {
            return (data.prs || []).find((pr) => Number(pr.id) === Number(id));
          }
          function nextPRNoteID(pr) {
            pr.next_note_id = Number(pr.next_note_id || 1);
            return pr.next_note_id++;
          }
          function nextPRCommentID(pr) {
            pr.next_comment_id = Number(pr.next_comment_id || 1);
            return pr.next_comment_id++;
          }
          function hashLineText(value) {
            return crypto.createHash("sha1").update(String(value || "")).digest("hex");
          }
          function normalizeReviewComments(pr, comments, key, head) {
            if (!Array.isArray(comments)) return [];
            const now = new Date().toISOString();
            return comments.map((comment) => {
              const body = String(comment.body || "").trim();
              if (!body) return null;
              const lineText = String(comment.line_text || "");
              return {
                id: nextPRCommentID(pr),
                user: key.user,
                body,
                file: String(comment.file || "").trim(),
                kind: String(comment.kind || "line").trim(),
                side: String(comment.side || "new").trim(),
                hunk: String(comment.hunk || "").trim(),
                hunk_index: Number(comment.hunk_index || 0),
                old_start: Number(comment.old_start || 0),
                new_start: Number(comment.new_start || 0),
                offset: Number(comment.offset || 0),
                line: Number(comment.line || 0),
                line_text: lineText,
                line_hash: String(comment.line_hash || hashLineText(lineText)),
                head: String(comment.head || head || pr.head || ""),
                at: now,
              };
            }).filter(Boolean);
          }
          function findPRComment(comments, id) {
            if (!Array.isArray(comments) || !id) return null;
            for (const comment of comments) {
              if (Number(comment.id) === Number(id)) return comment;
              const nested = findPRComment(comment.replies || [], id);
              if (nested) return nested;
            }
            return null;
          }
          function findPRReplyTarget(pr, noteID, commentID) {
            const notes = [...(pr.comments || []), ...(pr.reviews || [])];
