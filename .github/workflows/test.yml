name: Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15-intel
          - ubuntu-24.04
          - windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Unit Tests
        run: go test ./...

  local-broker-integration:
    name: Local Broker Integration (${{ matrix.runtime }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15-intel
          - ubuntu-24.04
          - windows-2022
        runtime:
          - gcp
          - aws
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          package-manager-cache: false

      - name: Local Broker Integration
        shell: bash
        run: ./testsuite/run-local-broker.sh "${{ matrix.runtime }}"
