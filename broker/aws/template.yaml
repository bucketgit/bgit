AWSTemplateFormatVersion: '2010-09-09'
Description: Minimal bgit SSH broker control-plane endpoint.
Parameters:
  CiMaterializerFunctionName:
    Type: String
    Default: bgit-ci-materializer
    Description: Trusted CI materializer Lambda function name invoked by the broker.
  OwnerBootstrapHash:
    Type: String
    NoEcho: true
    Default: ''
    Description: One-time owner bootstrap token SHA-256 hash.
Resources:
  CiMaterializerTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: bgit-ci-materializer-token
      GenerateSecretString:
        PasswordLength: 43
        ExcludePunctuation: true
  BrokerTransferRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub bgit-broker-transfer-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub arn:aws:iam::${AWS::AccountId}:role/bgit-broker-${AWS::Region}
      Policies:
        - PolicyName: bgit-transfer-session-boundary
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:AbortMultipartUpload
                Resource: arn:aws:s3:::*/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:HeadBucket
                  - s3:DeleteBucket
                Resource: arn:aws:s3:::*
  BrokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub bgit-broker-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: bgit-broker-table
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BrokerTable.Arn
                  - !GetAtt BrokerPullRequestTable.Arn
                  - !GetAtt BrokerMemberTable.Arn
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                  - sts:TagSession
                Resource: !GetAtt BrokerTransferRole.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:CreateBucket
                  - s3:HeadBucket
                  - s3:DeleteBucket
                Resource:
                  - arn:aws:s3:::*
                  - arn:aws:s3:::*/*
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                Resource: !Ref CiMaterializerTokenSecret
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${CiMaterializerFunctionName}
  BrokerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bgit-broker-repos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
  BrokerPullRequestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bgit-broker-prs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: repo_id
          AttributeType: S
        - AttributeName: pr_id
          AttributeType: N
      KeySchema:
        - AttributeName: repo_id
          KeyType: HASH
        - AttributeName: pr_id
          KeyType: RANGE
  BrokerMemberTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bgit-broker-members
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fingerprint
          AttributeType: S
        - AttributeName: repo_id
          AttributeType: S
      KeySchema:
        - AttributeName: fingerprint
          KeyType: HASH
        - AttributeName: repo_id
          KeyType: RANGE
  BrokerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bgit-broker
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt BrokerRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref BrokerTable
          PR_TABLE_NAME: !Ref BrokerPullRequestTable
          MEMBER_TABLE_NAME: !Ref BrokerMemberTable
          TRANSFER_ROLE_ARN: !GetAtt BrokerTransferRole.Arn
          BROKER_VERSION: {{BROKER_VERSION}}
          BGIT_CI_MATERIALIZER_FUNCTION_NAME: !Ref CiMaterializerFunctionName
          BGIT_CI_MATERIALIZER_SECRET_ARN: !Ref CiMaterializerTokenSecret
          BGIT_OWNER_BOOTSTRAP_HASH: !Ref OwnerBootstrapHash
      Code:
        ZipFile: |
          const crypto = require("crypto");
          const {DynamoDBClient, GetItemCommand, PutItemCommand, QueryCommand, ScanCommand, DeleteItemCommand} = require("@aws-sdk/client-dynamodb");
          const {S3Client, GetObjectCommand, PutObjectCommand, DeleteObjectCommand, ListObjectsV2Command, HeadBucketCommand, CreateBucketCommand, DeleteBucketCommand} = require("@aws-sdk/client-s3");
          const {STSClient, AssumeRoleCommand} = require("@aws-sdk/client-sts");
          const {SecretsManagerClient, GetSecretValueCommand, PutSecretValueCommand} = require("@aws-sdk/client-secrets-manager");
          const {LambdaClient, InvokeCommand} = require("@aws-sdk/client-lambda");
          const db = new DynamoDBClient({});
          const s3 = new S3Client({});
          const sts = new STSClient({});
          const secrets = new SecretsManagerClient({});
          const lambda = new LambdaClient({});
          const table = process.env.TABLE_NAME;
          const prTable = process.env.PR_TABLE_NAME;
          const memberTable = process.env.MEMBER_TABLE_NAME;
          const transferRoleArn = process.env.TRANSFER_ROLE_ARN;
          const ciMaterializerFunctionName = process.env.BGIT_CI_MATERIALIZER_FUNCTION_NAME;
          const ciMaterializerSecretArn = process.env.BGIT_CI_MATERIALIZER_SECRET_ARN;
          const brokerVersion = process.env.BROKER_VERSION || "{{BROKER_VERSION}}";
          const zero = "0000000000000000000000000000000000000000";
          const coreTeamID = "t_core";
          const coreTeamName = "core";
          function response(statusCode, body) {
            return {statusCode, headers: {"content-type": "application/json"}, body: JSON.stringify(body)};
          }
          function repoID(repo) {
            if (repo && repo.logical) return ["logical", repo.team_id || coreTeamID, repo.logical].join(":");
            return [repo.provider || "s3", repo.bucket, repo.prefix].join(":");
          }
          function legacyRepoID(repo) {
            if (repo && repo.logical) return ["logical", repo.logical].join(":");
            return [repo.provider || "s3", repo.bucket, repo.prefix].join(":");
          }
          function docID(repo) {
            return Buffer.from(repoID(repo)).toString("base64url");
          }
          function legacyDocID(repo) {
            return Buffer.from(legacyRepoID(repo)).toString("base64url");
          }
          function cleanName(value) {
            return String(value || "repo").toLowerCase().replace(/[^a-z0-9.-]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "repo";
          }
          function normalizeLogicalRepo(value) {
            const base = String(value || "").trim().replace(/\.git$/, "");
            if (!base) throw new Error("logical repo name is required");
            if (base.includes("/") || base.includes("\\")) throw new Error("logical repo names must be flat");
            if (base === "." || base === "..") throw new Error("logical repo name is invalid");
            return `${base}.git`;
          }
          function validateRepo(repo) {
            if (!repo || (!repo.logical && (!repo.bucket || !repo.prefix))) throw new Error("repo is required");
            if (repo.logical) repo.logical = normalizeLogicalRepo(repo.logical);
            if (repo.logical && !repo.team_id) repo.team_id = coreTeamID;
            return repo;
          }
          function randomSuffix() {
            return crypto.randomBytes(5).toString("hex");
          }
          async function loadRepo(repo) {
            const hadLogicalNoTeam = !!(repo && repo.logical && !repo.team_id);
            repo = validateRepo(repo);
            if (repo.logical && repo.team_id === coreTeamID) await ensureCoreTeam("repo");
            const id = docID(repo);
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            let data = {repo, keys: [], audit: []};
            let entryID = id;
            if (out.Item) data = JSON.parse(out.Item.data.S || "{}");
            else if (hadLogicalNoTeam || repo.team_id === coreTeamID) {
              const legacyID = legacyDocID(repo);
              const legacyOut = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: legacyID}}}));
              if (legacyOut.Item) {
                data = JSON.parse(legacyOut.Item.data.S || "{}");
                entryID = legacyID;
                data.repo = {...(data.repo || repo), team_id: coreTeamID};
              }
            }
            data.repo = data.repo || repo;
            if (data.repo.logical && !data.repo.team_id) data.repo.team_id = coreTeamID;
            data.keys = data.keys || [];
            data.audit = data.audit || [];
            const owners = await loadOwners();
            const ownerKeys = new Set((owners.data.keys || []).filter((owner) => owner.role === "owner").map((owner) => normalizeKey(owner.public_key)));
            data.keys = (data.keys || []).filter((key) => !(key.role === "owner" && ownerKeys.has(normalizeKey(key.public_key)) && key.source !== "ownership-transfer"));
            return {id: entryID, data};
          }
          async function loadExistingRepo(repo) {
            const hadLogicalNoTeam = !!(repo && repo.logical && !repo.team_id);
            repo = validateRepo(repo);
            const id = docID(repo);
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            let data;
            let entryID = id;
            if (out.Item) data = JSON.parse(out.Item.data.S || "{}");
            else if (hadLogicalNoTeam || repo.team_id === coreTeamID) {
              const legacyID = legacyDocID(repo);
              const legacyOut = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: legacyID}}}));
              if (legacyOut.Item) {
                data = JSON.parse(legacyOut.Item.data.S || "{}");
                entryID = legacyID;
                data.repo = {...(data.repo || repo), team_id: coreTeamID};
              }
            }
            if (!data) return null;
            data.repo = data.repo || repo;
            if (data.repo.logical && !data.repo.team_id) data.repo.team_id = coreTeamID;
            data.keys = data.keys || [];
            data.audit = data.audit || [];
            return {id: entryID, data};
          }
          async function saveRepo(entry) {
            await db.send(new PutItemCommand({TableName: table, Item: {id: {S: entry.id}, data: {S: JSON.stringify(entry.data)}}}));
            await syncMembershipIndex(entry);
          }
          async function syncMembershipIndex(entry) {
            const repo = entry.data.repo || {};
            if (!repo.logical && (!repo.bucket || !repo.prefix)) return;
            const repoIDValue = repoID(repo);
            const logical = repo.logical || repo.prefix || repoIDValue;
            const users = await loadBrokerUsers();
            const usersByID = new Map((users.data.users || []).map((user) => [user.id, user]));
            const memberships = new Map();
            function addMembership(publicKey, user, role, source, suspended) {
              if (!publicKey) return;
              const fingerprint = keyFingerprint(publicKey);
              const existing = memberships.get(fingerprint);
              const nextRole = existing ? strongerRole(existing.role, role || "") : role || "";
              memberships.set(fingerprint, {public_key: publicKey, user: user || "", role: nextRole, source: source || "", suspended: !!suspended});
            }
            for (const key of entry.data.keys || []) {
              addMembership(key.public_key, key.user, key.role, key.source, key.suspended);
            }
            for (const grant of entry.data.teams || []) {
              const team = await loadTeam(grant.id || grant.team_id);
              if (!team) continue;
              for (const member of team.data.members || []) {
                if (member.suspended) continue;
                const user = usersByID.get(member.user_id);
                if (!user || user.suspended || user.pending) continue;
                const role = weakerRole(normalizeRole(member.role || "read"), normalizeRole(grant.role || "read"));
                for (const key of user.keys || []) {
                  addMembership(key.public_key || key, user.username || member.username || member.user_id, role, "team", false);
                }
              }
            }
            for (const membership of memberships.values()) {
              const fingerprint = keyFingerprint(membership.public_key);
              await db.send(new PutItemCommand({TableName: memberTable, Item: {
                fingerprint: {S: fingerprint},
                repo_id: {S: repoIDValue},
                data: {S: JSON.stringify({repo_id: repoIDValue, logical, repo, user: membership.user || "", role: membership.role || "", source: membership.source || "", suspended: !!membership.suspended, updated_at: new Date().toISOString()})}
              }}));
            }
          }
          async function syncReposForTeam(teamID) {
            let ExclusiveStartKey;
            do {
              const out = await db.send(new ScanCommand({TableName: table, ExclusiveStartKey}));
              for (const item of out.Items || []) {
                const id = item.id && item.id.S || "";
                if (id.startsWith("_") || id.startsWith("team:")) continue;
                const data = JSON.parse(item.data && item.data.S || "{}");
                if ((data.teams || []).some((grant) => (grant.id || grant.team_id) === teamID)) await syncMembershipIndex({id, data});
              }
              ExclusiveStartKey = out.LastEvaluatedKey;
            } while (ExclusiveStartKey);
          }
          async function syncAllMembershipIndexes() {
            let count = 0;
            let ExclusiveStartKey;
            do {
              const out = await db.send(new ScanCommand({TableName: table, ExclusiveStartKey}));
              for (const item of out.Items || []) {
                const id = item.id && item.id.S || "";
                if (id === "_owners") continue;
                const data = JSON.parse(item.data && item.data.S || "{}");
                const repo = data.repo || {};
                if (!repo.logical && (!repo.bucket || !repo.prefix)) continue;
                count++;
                await syncMembershipIndex({id, data});
              }
              ExclusiveStartKey = out.LastEvaluatedKey;
            } while (ExclusiveStartKey);
            return count;
          }
          function prKey(repoID, id) {
            return {repo_id: {S: repoID}, pr_id: {N: String(Number(id))}};
          }
          async function savePR(entry, pr) {
            await db.send(new PutItemCommand({TableName: prTable, Item: {...prKey(entry.id, pr.id), data: {S: JSON.stringify(pr)}}}));
          }
          async function loadPR(entry, id) {
            const out = await db.send(new GetItemCommand({TableName: prTable, Key: prKey(entry.id, id)}));
            if (!out.Item) return null;
            return JSON.parse(out.Item.data.S || "{}");
          }
          async function listPRs(entry) {
            const prs = [];
            let startKey = undefined;
            do {
              const out = await db.send(new QueryCommand({
                TableName: prTable,
                KeyConditionExpression: "repo_id = :repo",
                ExpressionAttributeValues: {":repo": {S: entry.id}},
                ScanIndexForward: false,
                ExclusiveStartKey: startKey
              }));
              for (const item of out.Items || []) {
                const pr = JSON.parse(item.data.S || "{}");
                if (Number(pr.id || 0) > 0 && pr.kind !== "issue") prs.push(pr);
              }
              startKey = out.LastEvaluatedKey;
            } while (startKey);
            return prs;
          }
          async function syncPRRecords(entry, known) {
            const knownMap = known && typeof known === "object" ? known : {};
            const prs = await listPRs(entry);
            const present = new Set(prs.map((pr) => String(pr.id)));
            const deleted = Object.keys(knownMap).filter((id) => !present.has(String(id))).map((id) => Number(id)).filter((id) => Number.isFinite(id));
            return {
              prs: prs.filter((pr) => String(pr.version || "") !== String(knownMap[String(pr.id)] || "")),
              deleted,
            };
          }
          async function loadOwners() {
            const id = "_owners";
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            if (!out.Item) return {id, data: {keys: [], audit: []}};
            const data = JSON.parse(out.Item.data.S || "{}");
            data.keys = data.keys || [];
            data.audit = data.audit || [];
            return {id, data};
          }
          async function loadBrokerUsers() {
            const id = "_users";
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            const data = out.Item ? JSON.parse(out.Item.data.S || "{}") : {users: []};
            data.users = data.users || [];
            const owners = await loadOwners();
            for (const key of owners.data.keys || []) {
              const username = key.user || "owner";
              let user = data.users.find((item) => String(item.username || "").toLowerCase() === String(username).toLowerCase());
              if (!user) {
                user = {id: "u_" + cleanName(username), username, broker_role: key.role === "admin" ? "admin" : "owner", keys: [], suspended: false};
                data.users.push(user);
              }
              if (key.public_key && !user.keys.find((k) => normalizeKey(k.public_key || k) === normalizeKey(key.public_key))) user.keys.push({public_key: key.public_key, source: key.source || "owner"});
            }
            return {id, data};
          }
          async function saveBrokerUsers(entry) {
            await db.send(new PutItemCommand({TableName: table, Item: {id: {S: entry.id}, data: {S: JSON.stringify(entry.data)}}}));
          }
          function publicProfileForUser(user) {
            const profile = user && user.profile || {};
            return {bio: String(profile.bio || ""), avatar: String(profile.avatar || "")};
          }
          function normalizeProfileAvatar(value) {
            value = String(value || "").trim();
            if (!value) return "";
            if (value.length > 700000) throw Object.assign(new Error("avatar is too large"), {statusCode: 400});
            if (!/^data:image\/(png|jpeg|webp);base64,[A-Za-z0-9+/=]+$/.test(value)) throw Object.assign(new Error("avatar must be a cropped image data URL"), {statusCode: 400});
            return value;
          }
          function profileKeysForUser(entry, users, actor) {
            const keys = [];
            const seen = new Set();
            const addKey = (item) => {
              const publicKey = normalizeKey(item && (item.public_key || item));
              if (!publicKey || seen.has(publicKey)) return;
              seen.add(publicKey);
              keys.push({public_key: publicKey, fingerprint: keyFingerprint(publicKey), source: item.source || ""});
            };
            const username = String(actor.user || "").trim().toLowerCase();
            const brokerUser = (users.data.users || []).find((item) => String(item.username || item.id || "").trim().toLowerCase() === username);
            for (const key of brokerUser && brokerUser.keys || []) addKey(key);
            for (const key of entry.data.keys || []) {
              if (String(key.user || "").trim().toLowerCase() === username) addKey(key);
            }
            if (actor.public_key) addKey({public_key: actor.public_key, source: actor.source || ""});
            return keys;
          }
          function ensureProfileUser(users, actor) {
            const username = String(actor.user || "").trim();
            if (!username) throw Object.assign(new Error("user is required"), {statusCode: 403});
            let user = (users.data.users || []).find((item) => String(item.username || "").trim().toLowerCase() === username.toLowerCase());
            if (!user) {
              user = {id: actor.user_id || "u_" + cleanName(username), username, broker_role: "user", keys: [], suspended: false};
              users.data.users.push(user);
            }
            if (actor.public_key && !user.keys.find((key) => normalizeKey(key.public_key || key) === normalizeKey(actor.public_key))) user.keys.push({public_key: actor.public_key, source: actor.source || "profile"});
            user.profile = user.profile || {};
            return user;
          }
          function validBrokerRole(role) {
            return ["owner", "admin", "user"].includes(role);
          }
          function normalizeBrokerRole(role) {
            return validBrokerRole(role) ? role : "user";
          }
          async function signedBrokerUser(event) {
            const users = await loadBrokerUsers();
            const publicKey = normalizeKey(header(event, "x-bgit-key"));
            const message = String(header(event, "x-bgit-signature-message") || "");
            const signature = String(header(event, "x-bgit-signature") || "");
            if (!publicKey || !message || !signature) return null;
            for (const user of users.data.users || []) {
              if (user.suspended) continue;
              for (const key of user.keys || []) {
                const keyValue = normalizeKey(key.public_key || key);
                if (keyValue === publicKey && await verifySignedRequest(event, publicKey, message, signature)) return {user: user.username || user.id, user_id: user.id, broker_role: user.broker_role || "user", public_key: publicKey, source: "broker-user"};
              }
            }
            return null;
          }
          async function requireBrokerAdmin(event) {
            const user = await signedBrokerUser(event);
            if (user && (user.broker_role === "owner" || user.broker_role === "admin")) return user;
            const owners = await loadOwners();
            const key = await signedKey(event, owners);
            if (key && (key.role === "owner" || key.role === "admin")) return {user: key.user || "owner", broker_role: key.role, public_key: key.public_key};
            throw Object.assign(new Error("broker admin SSH signature required"), {statusCode: 403});
          }
          function teamDocID(teamID) {
            return "team:" + String(teamID || "").trim();
          }
          async function loadTeam(teamID) {
            const id = teamDocID(teamID);
            const out = await db.send(new GetItemCommand({TableName: table, Key: {id: {S: id}}}));
            if (!out.Item) return null;
            const data = JSON.parse(out.Item.data.S || "{}");
            data.members = data.members || [];
            return {id, data};
          }
          async function saveTeam(entry) {
            await db.send(new PutItemCommand({TableName: table, Item: {id: {S: entry.id}, data: {S: JSON.stringify(entry.data)}}}));
          }
          async function ensureCoreTeam(actor) {
            const existing = await loadTeam(coreTeamID);
            if (existing) return existing;
            const team = {id: coreTeamID, name: coreTeamName, members: [], created_by: actor || "setup", created_at: new Date().toISOString()};
            const entry = {id: teamDocID(coreTeamID), data: team};
            await saveTeam(entry);
            return entry;
          }
          async function loadTeamByName(name) {
            const want = String(name || "").trim().toLowerCase();
            if (!want) return null;
            if (want === coreTeamName || want === coreTeamID) return ensureCoreTeam("lookup");
            const out = await db.send(new ScanCommand({TableName: table}));
            const matches = (out.Items || [])
              .filter((item) => String(item.id.S || "").startsWith("team:"))
              .map((item) => ({id: item.id.S, data: JSON.parse(item.data.S || "{}")}))
              .filter((team) => String(team.data.name || "").trim().toLowerCase() === want || String(team.data.id || "").trim().toLowerCase() === want);
            if (matches.length === 0) return null;
            if (matches.length > 1) throw Object.assign(new Error("team name is ambiguous"), {statusCode: 409});
            matches[0].data.members = matches[0].data.members || [];
            return matches[0];
          }
          async function teamRoleForUser(teamID, userID) {
            if (!teamID || !userID) return "";
            const team = await loadTeam(teamID);
            if (!team) return "";
            const member = (team.data.members || []).find((item) => item.user_id === userID);
            return member && !member.suspended ? normalizeRole(member.role || "read") : "";
          }
          function strongerRole(a, b) {
            const rank = {read: 1, triage: 2, developer: 3, maintainer: 4, admin: 5, owner: 6};
            return (rank[b] || 0) > (rank[a] || 0) ? b : a;
          }
          function weakerRole(a, b) {
            const rank = {read: 1, triage: 2, developer: 3, maintainer: 4, admin: 5, owner: 6};
            if (!a) return b || "";
            if (!b) return a || "";
            return (rank[b] || 0) < (rank[a] || 0) ? b : a;
          }
          async function effectiveSignedKey(event, entry) {
            let direct = await signedKey(event, entry);
            let role = direct ? direct.role : "";
            const brokerUser = await signedBrokerUser(event);
            if (brokerUser) {
              for (const grant of entry.data.teams || []) {
                const teamRole = await teamRoleForUser(grant.id || grant.team_id, brokerUser.user_id);
                if (teamRole) role = strongerRole(role, weakerRole(teamRole, grant.role || teamRole));
