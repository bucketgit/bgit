                await requireBoardMutation(event, entry);
                return response(200, {users: await boardAssignableUsers(entry)});
              }
              if (path === "/issues/move" || path === "/issues/take" || path === "/issues/assign") {
                const entry = await loadRepo(body.repo);
                const key = await requireBoardMutation(event, entry);
                const issue = await loadIssue(entry, body.id);
                if (!issue) throw Object.assign(new Error("issue not found"), {statusCode: 404});
                if (issue.type !== "story") throw Object.assign(new Error("story not found"), {statusCode: 404});
                if (path === "/issues/move") issue.lane = normalizeBoardLane(body.lane);
                else if (path === "/issues/take") {
                  issue.assignee = key.user || "";
                  if (normalizeBoardLane(issue.lane) === "backlog") issue.lane = "doing";
                } else {
                  const assignee = String(body.assignee || "").trim();
                  if (assignee) {
                    const users = await boardAssignableUsers(entry);
                    const canonical = users.find((user) => user.toLowerCase() === assignee.toLowerCase());
                    if (!canonical) throw Object.assign(new Error("assignee is not assignable"), {statusCode: 400});
                    issue.assignee = canonical;
                  } else {
                    issue.assignee = "";
                  }
                }
                issue.updated_at = new Date().toISOString();
                await saveIssue(entry, issue);
                return response(200, {ok: true, issue});
              }
              if (path === "/issues/close" || path === "/issues/reopen") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "write");
                const issue = await loadIssue(entry, body.id);
                if (!issue) throw Object.assign(new Error("issue not found"), {statusCode: 404});
                issue.status = path === "/issues/reopen" ? "open" : "closed";
                issue.updated_at = new Date().toISOString();
                await saveIssue(entry, issue);
                return response(200, {ok: true, issue});
              }
              if (path === "/ci/list" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                return response(200, {runs: listCIRuns(entry.data)});
              }
              if (path === "/ci/view" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                const run = findCIRun(entry.data, body.id);
                if (!run) throw Object.assign(new Error("CI run not found"), {statusCode: 404});
                return response(200, {run});
              }
              if (path === "/ci/run" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireOperation(event, entry, "write");
                const repo = entry.data.repo || {};
                const provider = normalizeCIProvider(body.provider, repo);
                const ref = normalizeCIRef(body.ref || repo.default_branch || "refs/heads/main");
                const refs = entry.data.refs || {};
                const commit = String(body.commit || refs[ref] || "").trim();
                if (!commit || !/^[0-9a-f]{40}$/i.test(commit)) throw Object.assign(new Error("CI commit is required"), {statusCode: 400});
                if (!refs[ref]) throw Object.assign(new Error("CI ref not found"), {statusCode: 404});
                if (refs[ref] !== commit) throw Object.assign(new Error("CI commit does not match broker ref"), {statusCode: 409});
                const config = cleanCIConfig(body.config, provider);
                const now = new Date().toISOString();
                const run = {id: nextCIID(entry.data), provider, ref, commit, config, status: "queued", url: "", message: "", author: key.user || "", created_at: now, updated_at: now};
                await triggerCIRun(entry, run);
                run.updated_at = new Date().toISOString();
                entry.data.ci_runs = [run, ...(entry.data.ci_runs || [])].slice(0, 100);
                audit(entry, {type: "ci_run", id: run.id, provider, ref, commit, config, user: key.user});
                await saveRepo(entry);
                return response(200, {ok: true, run});
              }
              if (path === "/ci/secret/rotate" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireAdmin(event, entry);
                await rotateCIMaterializerToken();
                audit(entry, {type: "ci_secret_rotate", user: key.user});
                await saveRepo(entry);
                return response(200, {ok: true});
              }
              if (path === "/prs/create" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireOperation(event, entry, "write");
                entry.data.refs = entry.data.refs || {};
                const pr = {...(body.pr || {})};
                pr.id = nextPRID(entry.data);
                pr.status = "open";
                pr.author = key.user;
                pr.approvals = pr.approvals || 0;
                pr.checks = pr.checks || [];
                pr.head = entry.data.refs[pr.source] || "";
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_create", id: pr.id, source: pr.source, target: pr.target, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {pr});
              }
              if (path === "/prs/list" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                return response(200, {prs: await listPRs(entry)});
              }
              if (path === "/prs/sync" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                return response(200, await syncPRRecords(entry, body.known || {}));
              }
              if (path === "/prs/view" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                return response(200, {pr});
              }
              if (path === "/prs/close" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireOperation(event, entry, "write");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                pr.status = "closed";
                pr.closed_by = key.user;
                pr.closed_at = new Date().toISOString();
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_close", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/reopen" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireOperation(event, entry, "write");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                pr.status = "open";
                delete pr.closed_by;
                delete pr.closed_at;
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_reopen", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/comment" && method === "POST") {
                const entry = await loadRepo(body.repo);
                if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
                const key = await requireOperation(event, entry, "read");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                const comment = String(body.comment || "").trim();
                if (!comment) throw Object.assign(new Error("comment is required"), {statusCode: 400});
                pr.comments = pr.comments || [];
                pr.comments.push({id: nextPRNoteID(pr), user: key.user, body: comment, at: new Date().toISOString()});
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_comment", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/reply" && method === "POST") {
                const entry = await loadRepo(body.repo);
                if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
                const key = await requireOperation(event, entry, "read");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                const comment = String(body.comment || "").trim();
                if (!comment) throw Object.assign(new Error("comment is required"), {statusCode: 400});
                const target = findPRReplyTarget(pr, Number(body.target_note_id || 0), Number(body.target_comment_id || 0));
                if (!target) throw Object.assign(new Error("reply target not found"), {statusCode: 404});
                target.replies = target.replies || [];
                target.replies.push({id: nextPRCommentID(pr), user: key.user, body: comment, kind: "reply", at: new Date().toISOString()});
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_reply", id: pr.id, user: key.user});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/review" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireOperation(event, entry, "write");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                const state = String(body.review || "").trim();
                if (!["commented", "approved", "changes_requested"].includes(state)) throw Object.assign(new Error("unsupported review state"), {statusCode: 400});
                pr.reviews = pr.reviews || [];
                const comments = normalizeReviewComments(pr, body.comments, key, pr.head);
                pr.reviews.push({id: nextPRNoteID(pr), user: key.user, body: String(body.comment || "").trim(), state, comments, head: String(pr.head || ""), at: new Date().toISOString()});
                pr.approvals = countApprovals(pr);
                bumpPRVersion(entry.data, pr);
                audit(entry, {type: "pr_review", id: pr.id, user: key.user, state});
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/prs/merge" && method === "POST") {
                const entry = await loadRepo(body.repo);
                if (repoIsReadOnly(entry)) throw Object.assign(new Error("repository is read-only"), {statusCode: 403});
                const key = await requireOperation(event, entry, "merge");
                const pr = await loadPR(entry, body.id);
                if (!pr) throw Object.assign(new Error("pull request not found"), {statusCode: 404});
                if (pr.status !== "open") throw new Error("pull request is not open");
                const newHash = (entry.data.refs || {})[pr.source] || pr.head;
                if (!newHash) throw new Error("pull request source ref has no head");
                const oldHash = (entry.data.refs || {})[pr.target] || zero;
                await updateRefCAS(body.repo, pr.target, oldHash, newHash, key, {fromPR: true});
                const repo = await ensurePhysicalRepo(entry);
                await writeTextObject(repo, pr.target, newHash + "\n");
                entry.data.refs = entry.data.refs || {};
                entry.data.refs[pr.target] = newHash;
                pr.status = "merged";
                pr.merged_by = key.user;
                pr.merged_at = new Date().toISOString();
                bumpPRVersion(entry.data, pr);
                if (body.delete_branch && pr.source && pr.source !== pr.target) {
                  delete entry.data.refs[pr.source];
                  await deleteObject(repo, pr.source);
                  audit(entry, {type: "branch_delete", ref: pr.source, from_pr: pr.id, user: key.user});
                }
                await saveRepo(entry);
                await savePR(entry, pr);
                return response(200, {ok: true, pr});
              }
              if (path === "/auth/check" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await effectiveSignedKey(event, entry);
                const operation = body.operation || "";
                const allowed = (operation === "read" && repoIsPublic(entry)) || (!!key && roleAllows(key.role, operation));
                return response(200, {allowed, user: key && key.user || (allowed ? "anonymous" : ""), role: key && key.role || (allowed ? "read" : "")});
              }
              if (path === "/auth/status" && method === "POST") {
                const entry = await loadRepo(body.repo);
                let key = await effectiveSignedKey(event, entry) || (repoIsPublic(entry) ? anonymousKey() : null);
                const brokerAdmin = await requireBrokerAdmin(event).catch(() => null);
                if (!key && brokerAdmin) key = {user: brokerAdmin.user || "", role: "", broker_role: brokerAdmin.broker_role || "admin", public_key: brokerAdmin.public_key || "", source: "broker-admin"};
                if (!key) throw Object.assign(new Error("SSH signature required"), {statusCode: 403});
                const capabilities = roleCapabilities(key.role || "");
                if (brokerAdmin) {
                  capabilities.admin_keys = true;
                  capabilities.manage_protection = true;
                  capabilities.broker_upgrade = true;
                }
                return response(200, {
                  broker_version: brokerVersion,
                  repo: entry.data.repo || body.repo,
                  identity: {user: key.user || "", source: key.source || "", key_fingerprint: key.public_key ? keyFingerprint(key.public_key) : "", public_key: key.public_key || ""},
                  user: key.user || "",
                  role: key.role || "",
                  capabilities,
                  resolved_at: new Date().toISOString(),
                });
              }
              if ((path === "/profile/get" || path === "/profile/update") && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await effectiveSignedKey(event, entry);
                if (!key) throw Object.assign(new Error("SSH signature required"), {statusCode: 403});
                const users = await loadBrokerUsers();
                const user = ensureProfileUser(users, key);
                if (path === "/profile/update") {
                  user.profile.bio = String(body.bio || "").trim().slice(0, 2000);
                  user.profile.avatar = normalizeProfileAvatar(body.avatar || "");
                  await saveBrokerUsers(users);
                }
                return response(200, {user: user.username || key.user || "", profile: publicProfileForUser(user), keys: profileKeysForUser(entry, users, key)});
              }
              if (path === "/repos/mine" && method === "POST") {
                const fingerprint = header(event, "x-bgit-key-fingerprint") || "";
                if (!fingerprint) throw Object.assign(new Error("SSH signature required"), {statusCode: 403});
                const signed = await submittedSignedKey(event);
                if (!signed || signed.fingerprint !== fingerprint) throw Object.assign(new Error("SSH signature required"), {statusCode: 403});
                const out = await db.send(new QueryCommand({
                  TableName: memberTable,
                  KeyConditionExpression: "fingerprint = :fingerprint",
                  ExpressionAttributeValues: {":fingerprint": {S: fingerprint}}
                }));
                const repos = [];
                for (const item of out.Items || []) {
                  const data = JSON.parse(item.data.S || "{}");
                  if (!data.suspended && data.repo && (data.repo.logical || (data.repo.bucket && data.repo.prefix))) repos.push({...data, key_fingerprint: fingerprint});
                }
                repos.sort((a, b) => String(a.logical || a.repo_id || "").localeCompare(String(b.logical || b.repo_id || "")));
                return response(200, {repos});
              }
              if (path === "/members/reindex" && method === "POST") {
                if (body.repo && (body.repo.logical || body.repo.bucket || body.repo.prefix)) {
                  const entry = await loadRepo(body.repo);
                  await requireAdmin(event, entry);
                  await syncMembershipIndex(entry);
                  return response(200, {ok: true, repositories: 1});
                }
                const owners = await loadOwners();
                if (!await verifySignature(event, owners)) throw Object.assign(new Error("owner SSH signature required"), {statusCode: 403});
                const count = await syncAllMembershipIndexes();
                return response(200, {ok: true, repositories: count});
              }
              if (path === "/objects/capability" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const operation = body.operation || "read";
                const key = await requireOperation(event, entry, operation === "read" ? "read" : "write");
                const repo = await ensurePhysicalRepo(entry);
                const capabilityPath = validateCapabilityPath(operation, body.path);
                const capability = await objectCapability(repo, capabilityPath, operation, key);
                audit(entry, {type: "capability_issued", operation, path: capabilityPath, user: key.user, role: key.role});
                await saveRepo(entry);
                return response(200, capability);
              }
              if (path === "/objects/read" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                const repo = await ensurePhysicalRepo(entry);
                return response(200, {data: await readObject(repo, body.path)});
              }
              if (path === "/objects/list" && method === "POST") {
                const entry = await loadRepo(body.repo);
                await requireOperation(event, entry, "read");
                const repo = await ensurePhysicalRepo(entry);
                return response(200, {paths: await listObjects(repo, body.prefix)});
              }
              if (path === "/refs/update" && method === "POST") {
                const entry = await loadRepo(body.repo);
                const key = await requireOperation(event, entry, "write");
                await updateRefCAS(body.repo, body.ref, body.old, body.new, key, {override: !!body.override});
                return response(200, {ok: true});
              }
              return response(404, {error: "unknown broker endpoint"});
            } catch (err) {
              return response(err.statusCode || 500, {error: err.message || String(err)});
            }
          };
  BrokerFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref BrokerFunction
      AuthType: NONE
  BrokerFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BrokerFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE
  BrokerFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BrokerFunction
      Action: lambda:InvokeFunction
      Principal: '*'
      InvokedViaFunctionUrl: true
Outputs:
  BrokerUrl:
    Value: !GetAtt BrokerFunctionUrl.FunctionUrl
