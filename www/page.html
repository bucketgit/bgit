<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="bgit-csrf-token" content="{{CSRF}}">
  <title>{{TITLE}}</title>
  <link rel="icon" href="/favicon.ico">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('bgit.theme');
        if (theme === 'light' || theme === 'dark') document.documentElement.dataset.theme = theme;
      } catch (_) {}
    }());
  </script>
  <style>{{CSS}}</style>
</head>

<div class="sync-status" data-sync-status>Checking remote…</div>

<script>{{JS}}</script>
</body>
</html>
